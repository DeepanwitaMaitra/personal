<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Real-Time Weather Forecast</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>SkyCast</h1>
            <p class="subtitle">Real-Time Weather Forecast</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search for a city..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="geoBtn" class="geo-btn" title="Get your location">📍</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </section>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner hidden">
            <div class="spin"></div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Current Weather -->
        <section id="currentWeather" class="weather-card hidden">
            <div class="weather-header">
                <div class="location-info">
                    <h2 id="cityName" class="city-name"></h2>
                    <p id="weatherDescription" class="weather-description"></p>
                </div>
                <div class="weather-icon-main">
                    <img id="weatherIcon" src="" alt="Weather icon" class="icon-large">
                </div>
            </div>
            <div class="temperature-section">
                <div class="temp-display">
                    <span id="temperature" class="temperature"></span>
                    <span class="degree">°C</span>
                </div>
                <div class="feels-like">
                    Feels like <span id="feelsLike"></span>°C
                </div>
            </div>
            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">Humidity</span>
                    <span id="humidity" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Wind Speed</span>
                    <span id="windSpeed" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Pressure</span>
                    <span id="pressure" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">UV Index</span>
                    <span id="uvIndex" class="detail-value"></span>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast -->
        <section id="forecastSection" class="forecast-section hidden">
            <h3 class="forecast-title">5-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by OpenWeatherMap API</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
